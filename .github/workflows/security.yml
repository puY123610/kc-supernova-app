name: security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 2 * * *"

jobs:
  sast-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: returntocorp/semgrep-action@v1
        with:
          generateSarif: "1"
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  secrets-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run dependency scan (or skip for bootstrap repo)
        run: |
          if [ ! -f package.json ]; then
            echo "No package.json found; bootstrap repo dependency scan skipped."
            exit 0
          fi
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --package-lock-only
            npm ci
          fi
          npx --yes osv-scanner@latest --recursive . --output=osv-results.json
          if [ -s osv-results.json ] && ! grep -q '"vulns": \[\]' osv-results.json; then
            echo "Dependency vulnerabilities found"
            cat osv-results.json
            exit 1
          fi
