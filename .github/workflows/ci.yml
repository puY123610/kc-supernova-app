name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run lint (or skip for bootstrap repo)
        run: |
          if [ ! -f package.json ]; then
            echo "No package.json found; bootstrap repo lint skipped."
            exit 0
          fi
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --package-lock-only
            npm ci
          fi
          npm run lint

  unit-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run unit tests (or skip for bootstrap repo)
        run: |
          if [ ! -f package.json ]; then
            echo "No package.json found; bootstrap repo unit tests skipped."
            exit 0
          fi
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --package-lock-only
            npm ci
          fi
          npm run test:unit -- --ci

  e2e-test:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run E2E tests (or skip for bootstrap repo)
        run: |
          if [ ! -f package.json ]; then
            echo "No package.json found; bootstrap repo E2E tests skipped."
            exit 0
          fi
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --package-lock-only
            npm ci
          fi
          npx playwright install --with-deps
          npm run test:e2e
